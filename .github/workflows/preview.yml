name: PR Preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "site/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set preview slug
        id: slug
        run: |
          echo "value=$(echo '${{ github.head_ref }}' | sed 's/[^a-zA-Z0-9_-]/-/g' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Write version
        run: echo "${{ github.sha }}" > ./site/version.txt

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: preview/${{ steps.slug.outputs.value }}
          keep_files: true

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview -->';
            const url = `https://pauseai.uk/preview/${{ steps.slug.outputs.value }}/`;
            const body = `${marker}\n🔍 **Preview:** ${url}\n\n_Lighthouse running…_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Wait for preview to go live
        run: |
          url="https://pauseai.uk/preview/${{ steps.slug.outputs.value }}/"
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then echo "Live"; exit 0; fi
            echo "Attempt $i: $status — retrying in 10s"
            sleep 10
          done
          echo "Timed out waiting for preview" && exit 1

      - name: Run Lighthouse
        id: lighthouse
        continue-on-error: true
        run: |
          mkdir -p lighthouse-reports
          npx lighthouse "https://pauseai.uk/preview/${{ steps.slug.outputs.value }}/" \
            --output=json \
            --output-path=./lighthouse-reports/preview.json \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
            --only-categories=performance,accessibility,best-practices,seo

      - name: Update comment with Lighthouse scores
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview -->';
            const url = `https://pauseai.uk/preview/${{ steps.slug.outputs.value }}/`;
            let scores = '';
            if ('${{ steps.lighthouse.outcome }}' === 'success') {
              const fs = require('fs');
              const report = JSON.parse(fs.readFileSync('./lighthouse-reports/preview.json', 'utf8'));
              const cats = report.categories;
              const audits = report.audits;
              const s = (key) => Math.round(cats[key].score * 100);
              const scoreEmoji = (n) => n >= 90 ? '🟢' : n >= 50 ? '🟠' : '🔴';

              let baseline = null;
              try {
                const res = await fetch('https://pauseai.uk/lighthouse-baseline.json');
                if (res.ok) baseline = await res.json();
              } catch (e) {}

              const bv = (key) => baseline ? baseline.audits[key].displayValue : '—';
              const bs = (key) => baseline ? Math.round(baseline.categories[key].score * 100) : null;
              const deltaMs = (key) => {
                if (!baseline) return '';
                const diff = audits[key].numericValue - baseline.audits[key].numericValue;
                const sign = diff > 0 ? '+' : '';
                const better = diff < 0;
                return ` (${better ? '✅' : '⚠️'} ${sign}${(diff / 1000).toFixed(2)}s)`;
              };
              const deltaCls = () => {
                if (!baseline) return '';
                const diff = audits['cumulative-layout-shift'].numericValue - baseline.audits['cumulative-layout-shift'].numericValue;
                const sign = diff > 0 ? '+' : '';
                return ` (${diff < 0 ? '✅' : '⚠️'} ${sign}${diff.toFixed(3)})`;
              };
              const scoreRow = (label, key) => {
                const cur = s(key); const base = bs(key);
                const delta = base !== null ? ` (${cur > base ? '✅ +' : cur < base ? '⚠️ ' : ''}${base !== null && cur !== base ? cur - base : '±0'})` : '';
                return `| ${label} | ${scoreEmoji(cur)} ${cur}${delta} | ${base !== null ? `${scoreEmoji(base)} ${base}` : '—'} |`;
              };

              scores = `\n\n**Lighthouse scores:**\n| Category | Preview | Baseline |\n|---|---|---|\n${scoreRow('Performance', 'performance')}\n${scoreRow('Accessibility', 'accessibility')}\n${scoreRow('Best Practices', 'best-practices')}\n${scoreRow('SEO', 'seo')}\n\n**Performance metrics:**\n| Metric | Preview | Baseline |\n|---|---|---|\n| FCP | ${audits['first-contentful-paint'].displayValue}${deltaMs('first-contentful-paint')} | ${bv('first-contentful-paint')} |\n| LCP | ${audits['largest-contentful-paint'].displayValue}${deltaMs('largest-contentful-paint')} | ${bv('largest-contentful-paint')} |\n| TBT | ${audits['total-blocking-time'].displayValue}${deltaMs('total-blocking-time')} | ${bv('total-blocking-time')} |\n| Speed Index | ${audits['speed-index'].displayValue}${deltaMs('speed-index')} | ${bv('speed-index')} |\n| TTI | ${audits['interactive'].displayValue}${deltaMs('interactive')} | ${bv('interactive')} |\n| CLS | ${audits['cumulative-layout-shift'].displayValue}${deltaCls()} | ${bv('cumulative-layout-shift')} |`;
            } else {
              scores = '\n\n_Lighthouse did not complete._';
            }
            const body = `${marker}\n🔍 **Preview:** ${url}${scores}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

